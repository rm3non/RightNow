name: right_now
description: "Right Now - Intent-first, identity-delayed connection platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0
  cloud_functions: ^5.3.0
  
  # State Management
  provider: ^6.1.5+1
  
  # Navigation
  go_router: ^17.2.1
  
  # UI & Utilities
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.3
  pin_code_fields: ^9.3.0
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
